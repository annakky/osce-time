<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>의대생 시험 타이머</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=SUIT:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-shape shape-1" aria-hidden="true"></div>
  <div class="bg-shape shape-2" aria-hidden="true"></div>

  <main class="app">
    <header class="header">
      <h1>의대생 시험 진행 타이머</h1>
      <p>시험 시간 관리 + 체크리스트 수행 확인</p>
    </header>

    <section class="panel timer-panel">
      <div class="timer-top-row">
        <label for="durationInput">시험 시간(분)</label>
        <input id="durationInput" type="number" min="1" max="180" step="1" value="12" />
      </div>

      <div class="timer-display-wrap">
        <div id="timerDisplay" class="timer-display" aria-live="polite">12:00</div>
        <div id="timerStatus" class="timer-status">대기 중</div>
      </div>

      <div class="timer-controls">
        <button id="startBtn" class="btn btn-primary">시작</button>
        <button id="pauseBtn" class="btn" disabled>멈춤</button>
        <button id="lapBtn" class="btn" disabled>랩 기록</button>
        <button id="resetBtn" class="btn btn-danger">초기화</button>
      </div>

      <section class="laps">
        <h2>랩 기록</h2>
        <ul id="lapList"></ul>
      </section>
    </section>

    <section class="panel checklist-panel">
      <div class="checklist-head">
        <h2>체크리스트</h2>
      </div>
      <div class="checklist-select-row">
        <select id="checklistSelect" class="checklist-inline-select"></select>
      </div>

      <div class="checklist-actions">
        <button id="resetChecklistBtn" class="btn btn-small btn-danger">초기화</button>
        <button id="openAddChecklistBtn" class="btn btn-small">추가</button>
        <button id="openEditChecklistBtn" class="btn btn-small">수정</button>
        <button id="openDeleteChecklistBtn" class="btn btn-small btn-danger">삭제</button>
      </div>
      <ul id="activeChecklist" class="active-checklist"></ul>
    </section>
  </main>

  <div id="manageModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="manageModalTitle">
    <div class="modal-backdrop" id="modalBackdrop"></div>
    <section class="modal-card">
      <div class="modal-header">
        <h3 id="manageModalTitle">체크리스트 추가</h3>
      </div>

      <div class="manage-row">
        <label for="modalChecklistNameInput">이름</label>
        <input id="modalChecklistNameInput" type="text" placeholder="체크리스트 이름 입력" />
      </div>

      <div class="manage-row">
        <input id="modalNewItemInput" type="text" placeholder="새 항목 추가" />
        <button id="modalAddItemBtn" class="btn btn-small">항목 추가</button>
      </div>

      <ul id="modalItemsList" class="manage-items"></ul>

      <div class="modal-actions">
        <button id="modalCancelBtn" class="btn">취소</button>
        <button id="modalSaveBtn" class="btn btn-primary">추가</button>
      </div>
    </section>
  </div>

  <div id="deleteConfirmModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle">
    <div class="modal-backdrop" id="deleteModalBackdrop"></div>
    <section class="modal-card modal-small">
      <div class="modal-header">
        <h3 id="deleteModalTitle">체크리스트 삭제</h3>
      </div>
      <p id="deleteModalText">정말로 삭제할까요?</p>
      <div class="modal-actions">
        <button id="deleteNoBtn" class="btn">아니오</button>
        <button id="deleteYesBtn" class="btn btn-danger">예</button>
      </div>
    </section>
  </div>

  <div id="resetConfirmModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="resetModalTitle">
    <div class="modal-backdrop" id="resetModalBackdrop"></div>
    <section class="modal-card modal-small">
      <div class="modal-header">
        <h3 id="resetModalTitle">체크리스트 초기화</h3>
      </div>
      <p>초기화하면 로컬 수정 내용이 삭제되고 txt 원본으로 다시 불러옵니다. 진행할까요?</p>
      <div class="modal-actions">
        <button id="resetNoBtn" class="btn">아니오</button>
        <button id="resetYesBtn" class="btn btn-danger">예</button>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
